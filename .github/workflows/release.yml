name: Release

# Cut a release by bumping frontend/package.json and pushing a tag:
#   git tag v0.1.0 && git push --tags
# Builds the touch SPA and attaches dist as a release asset (usable by a Moonraker `web`
# update_manager). The packaged Tauri kiosk bundle is built separately once a Rust toolchain is set up.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: cd frontend && npm ci && npm run build
      - run: tar -czf filamind-screen-dist-${{ github.ref_name }}.tar.gz -C frontend/dist .
      # Release notes come from CHANGELOG.md (not auto-generated from commits) so the
      # published text is authored and stays within the R1 no-external-refs rule.
      - name: Release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { cap=1; next }
            cap && /^## \[/ { exit }
            cap { print }
          ' CHANGELOG.md > NOTES.md
          [ -s NOTES.md ] || echo "See CHANGELOG.md for details." > NOTES.md
      - uses: softprops/action-gh-release@v3
        with:
          files: filamind-screen-dist-${{ github.ref_name }}.tar.gz
          body_path: NOTES.md

  # Build the arm64 .deb (the native touch app) and attach it to the Release under a stable asset
  # name, so deploy/install-native.sh can fetch it from /releases/latest/download/. Mirrors the
  # bundle.yml build env (node:20-bookworm arm64 → runs on the CB1's trixie glibc 2.41).
  deb:
    needs: release
    runs-on: ubuntu-24.04-arm # glibc 2.39 → forward-compatible with the CB1's trixie (glibc 2.41)
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Tauri 2 build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build the arm64 .deb
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci
          npm run build
          npm run tauri -- icon src-tauri/icons/icon-source.png
          npm run tauri -- build --bundles deb
          deb="$(find src-tauri/target -name '*.deb' | head -1)"
          [ -n "$deb" ] || { echo "::error::no .deb produced"; exit 1; }
          cp "$deb" "filamind-screen-arm64.deb"
      # Append the asset to the Release the `release` job created (a JS action — needs no gh CLI,
      # which the arm64 runner may lack; omitting body leaves the CHANGELOG notes untouched).
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: frontend/filamind-screen-arm64.deb
