name: CI
on: [push, pull_request]

jobs:
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the CI-built dist back to the PR branch
    defaults:
      run:
        working-directory: frontend
    steps:
      # On a PR, check out the branch tip (not the merge commit) so we can push the rebuilt dist
      # back to it; on push to main, head_ref is empty and the default checkout is used.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22' # vue-i18n 11 + unplugin require Node >= 22
      # NOTE: @filamind-app/core must be resolvable — published package (release) or the suite workspace symlink (dev).
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run type-check
      - run: npm test
      - run: npm run i18n:keydiff # every locale must carry exactly the `en` key set
      - run: npm run build
      - name: No external-project references (R1)
        run: bash scripts/check-no-external-refs.sh
      # The screen app serves the prebuilt bundle from git (no Node on the host), so the committed
      # dist must match a fresh build. CI is the canonical builder: on a PR, rebuild and commit
      # frontend/dist back to the branch; on push to main, only verify it is fresh.
      - name: Commit rebuilt dist back to the PR branch
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain -- dist)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dist
            git commit -m "chore(ci): rebuild frontend/dist"
            git push origin HEAD:${{ github.head_ref }}
          fi
      # The bundler's chunk hashes aren't byte-reproducible across runs (the i18n virtual modules
      # rehash), so a strict committed-vs-rebuild match can't pass on main. The PR job is the real
      # gate (it rebuilds + commits the canonical dist per PR). On main we sanity-check a coherent
      # bundle is committed (index.html present + its entry chunk exists) and only warn on hash drift.
      - name: Sanity-check committed frontend/dist
        if: github.event_name == 'push'
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html is missing"; exit 1; }
          entry=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)
          if [ -z "$entry" ] || [ ! -f "dist/$entry" ]; then
            echo "::error::dist entry chunk missing or unreferenced ($entry) - the committed bundle is broken/stale"
            exit 1
          fi
          if [ -n "$(git status --porcelain -- dist)" ]; then
            echo "::warning::frontend/dist differs from a fresh local rebuild (non-deterministic bundler hashes); the committed bundle is the canonical PR build."
          fi

  # A Tauri (Rust) build job is added once app icons are generated (`npm run tauri icon`) and the
  # CI runner installs the Tauri prerequisites (WebKitGTK etc.). The Rust shell is the standard
  # Tauri 2 template; build it locally with `npm run tauri build` from frontend/.
